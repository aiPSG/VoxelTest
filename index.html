<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxelTest</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #263238; overflow: hidden; font-family: monospace; cursor: pointer; }
  canvas { display: block; }

  #hint {
    position: fixed; top: 24px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.22); font-size: 11px; letter-spacing: 0.1em;
    pointer-events: none; white-space: nowrap;
  }
  #mode {
    position: fixed; top: 44px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.45); font-size: 13px; letter-spacing: 0.15em;
    pointer-events: none;
  }
  #ui {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 10px 18px; border-radius: 32px;
    backdrop-filter: blur(10px);
  }
  #ui button {
    background: rgba(255,255,255,0.1); color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 7px 16px; border-radius: 20px;
    cursor: pointer; font-family: monospace; font-size: 12px;
    letter-spacing: 0.1em;
    transition: background 0.15s;
  }
  #ui button:hover { background: rgba(255,255,255,0.2); }
  #ui button:disabled { opacity: 0.35; cursor: default; }
  .sep { width: 1px; height: 22px; background: rgba(255,255,255,0.12); }
  #ui span { color: rgba(255,255,255,0.35); font-size: 10px; letter-spacing: 0.08em; }
  #lightBlend { width: 90px; accent-color: #fff; opacity: 0.55; cursor: pointer; }
</style>
</head>
<body>
<div id="hint">CLICK TO SCATTER · DRAG TO ORBIT</div>
<div id="mode">CITY</div>
<div id="ui">
  <button id="btnSwitch">→ LETTERS</button>
  <div class="sep"></div>
  <span>FLAT</span>
  <input type="range" id="lightBlend" min="0" max="100" value="0">
  <span>LIT</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x263238);

const frustum = 16;
let aspect = innerWidth / innerHeight;
const camera = new THREE.OrthographicCamera(
  -frustum * aspect, frustum * aspect, frustum, -frustum, -200, 200
);
camera.position.set(20, 20, 20);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

const ambient = new THREE.AmbientLight(0xffffff, 10); scene.add(ambient);
const key     = new THREE.DirectionalLight(0xffffff, 0); key.position.set(8, 20, 8); scene.add(key);
const fill    = new THREE.DirectionalLight(0xaaccff, 0); fill.position.set(-10, 4, -8); scene.add(fill);
const rim     = new THREE.DirectionalLight(0xffeedd, 0); rim.position.set(0, -8, -10); scene.add(rim);

let lightBlend = 0;
function applyLight(b) {
  ambient.intensity = THREE.MathUtils.lerp(10, 0.3, b);
  key.intensity     = THREE.MathUtils.lerp(0, 1.8, b);
  fill.intensity    = THREE.MathUtils.lerp(0, 0.5, b);
  rim.intensity     = THREE.MathUtils.lerp(0, 0.3, b);
}

function buildCityPositions() {
  const H = [
    [0, 0, 1, 2, 2, 1, 0, 0],
    [0, 1, 2, 4, 4, 2, 1, 0],
    [1, 2, 4, 6, 5, 3, 2, 0],
    [0, 1, 3, 5, 6, 4, 2, 1],
    [0, 1, 2, 4, 4, 3, 1, 0],
    [0, 0, 1, 2, 3, 2, 0, 0],
  ];
  const s = 1.4, rows = H.length, cols = H[0].length;
  const out = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      for (let y = 0; y < H[r][c]; y++)
        out.push(new THREE.Vector3(
          (c - (cols - 1) / 2) * s, y, (r - (rows - 1) / 2) * s
        ));
  return out;
}

function buildLetterPositions() {
  const glyphs = {
    V: ['110011','110011','110011','011110','001100','001100'],
    O: ['011110','110011','110011','110011','110011','011110'],
    X: ['110011','110011','011110','011110','110011','110011'],
    L: ['110000','110000','110000','110000','111111','111111'],
  };
  const word = ['V','O','X','L'];
  const lw = 6, gap = 2, lh = 6;
  const totalW = word.length * lw + (word.length - 1) * gap;
  const s = 0.88;
  const out = [];
  word.forEach((ch, li) => {
    const startX = li * (lw + gap);
    glyphs[ch].forEach((row, ri) => {
      [...row].forEach((bit, ci) => {
        if (bit === '1') {
          out.push(new THREE.Vector3(
            (startX + ci - (totalW - 1) / 2) * s,
            0,
            (ri - (lh - 1) / 2) * s
          ));
        }
      });
    });
  });
  return out;
}

const arrangements = {
  city:    buildCityPositions(),
  letters: buildLetterPositions(),
};

const geo = new THREE.BoxGeometry(0.88, 0.88, 0.88);
const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });

const voxels = arrangements.city.map(p => {
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(p);
  mesh.rotation.set(0, 0, 0);
  scene.add(mesh);
  return { mesh, from: new THREE.Vector3(), to: new THREE.Vector3() };
});

let currentArr = 'city';
let isAssembled = true;
let phase = 'idle';
let progress = 0;
let animDuration = 1.4;
let animEase;

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }
function easeOut(t)   { return 1 - (1 - t) * (1 - t); }

function startAnim(positions, dur, easeFn) {
  voxels.forEach((v, i) => { v.from.copy(v.mesh.position); v.to.copy(positions[i]); });
  animEase = easeFn || easeInOut;
  animDuration = dur;
  phase = 'animating';
  progress = 0;
}

const hint   = document.getElementById('hint');
const modeEl = document.getElementById('mode');
const btnSwitch = document.getElementById('btnSwitch');
let pDown = { x: 0, y: 0 };

renderer.domElement.addEventListener('pointerdown', e => { pDown = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('pointerup', e => {
  if (Math.hypot(e.clientX - pDown.x, e.clientY - pDown.y) > 5) return;
  if (phase !== 'idle') return;
  if (isAssembled) {
    const targets = voxels.map(v => {
      const ang = Math.random() * Math.PI * 2;
      const r = 18 + Math.random() * 14;
      return new THREE.Vector3(Math.cos(ang) * r, v.mesh.position.y, Math.sin(ang) * r);
    });
    startAnim(targets, 0.9, easeOut);
    isAssembled = false;
    hint.textContent = 'CLICK TO REASSEMBLE · DRAG TO ORBIT';
    btnSwitch.disabled = true;
  } else {
    startAnim(arrangements[currentArr], 1.4);
    isAssembled = true;
    hint.textContent = 'CLICK TO SCATTER · DRAG TO ORBIT';
    btnSwitch.disabled = false;
  }
});

btnSwitch.onclick = () => {
  if (phase !== 'idle' || !isAssembled) return;
  currentArr = currentArr === 'city' ? 'letters' : 'city';
  startAnim(arrangements[currentArr], 1.8);
  btnSwitch.textContent = currentArr === 'city' ? '→ LETTERS' : '→ CITY';
  modeEl.textContent = currentArr.toUpperCase();
};

const clock = new THREE.Clock();

renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  if (phase === 'animating') {
    progress = Math.min(1, progress + dt / animDuration);
    const t = animEase(progress);
    voxels.forEach(v => v.mesh.position.lerpVectors(v.from, v.to, t));
    if (progress >= 1) {
      voxels.forEach(v => { v.mesh.position.copy(v.to); v.mesh.rotation.set(0,0,0); });
      phase = 'idle';
    }
  }
  applyLight(lightBlend);
  controls.update();
  renderer.render(scene, camera);
});

document.getElementById('lightBlend').oninput = e => { lightBlend = e.target.value / 100; };

window.addEventListener('resize', () => {
  aspect = innerWidth / innerHeight;
  camera.left = -frustum * aspect; camera.right = frustum * aspect;
  camera.top = frustum; camera.bottom = -frustum;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
