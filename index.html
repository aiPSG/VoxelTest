<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxelTest</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #263238; overflow: hidden; font-family: monospace; cursor: pointer; }
  canvas { display: block; }

  #hint {
    position: fixed; top: 22px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.2); font-size: 11px; letter-spacing: 0.1em;
    pointer-events: none; white-space: nowrap;
  }
  #mode {
    position: fixed; top: 40px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 0.18em;
    pointer-events: none;
  }

  #ui {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 9px 16px; border-radius: 32px;
    backdrop-filter: blur(12px);
    white-space: nowrap;
  }
  #ui button {
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 6px 13px; border-radius: 18px;
    cursor: pointer; font-family: monospace; font-size: 11px; letter-spacing: 0.1em;
    transition: background 0.15s, color 0.15s;
  }
  #ui button:hover  { background: rgba(255,255,255,0.18); color: #fff; }
  #ui button.active { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.4); }
  #ui button:disabled { opacity: 0.3; cursor: default; }

  #wordInput {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff; font-family: monospace; font-size: 12px; letter-spacing: 0.12em;
    padding: 6px 10px; border-radius: 18px; outline: none; width: 140px;
    text-transform: uppercase;
  }
  #wordInput::placeholder { color: rgba(255,255,255,0.25); }
  #wordInput:focus { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.1); }

  .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
  #ui span { color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 0.08em; }
  #lightBlend { width: 80px; accent-color: #fff; opacity: 0.5; cursor: pointer; }
</style>
</head>
<body>
<div id="hint">CLICK TO SCATTER · DRAG TO ORBIT</div>
<div id="mode">CITY</div>

<div id="ui">
  <button id="btnCity" class="active">CITY</button>
  <button id="btnLetters">VOXL</button>
  <div class="sep"></div>
  <input type="text" id="wordInput" placeholder="SPELL A WORD" maxlength="10" spellcheck="false">
  <button id="btnBuild">BUILD</button>
  <div class="sep"></div>
  <span>FLAT</span>
  <input type="range" id="lightBlend" min="0" max="100" value="0">
  <span>LIT</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x263238);

const frustum = 16;
let aspect = innerWidth / innerHeight;
const camera = new THREE.OrthographicCamera(
  -frustum * aspect, frustum * aspect, frustum, -frustum, -200, 200
);
camera.position.set(20, 20, 20);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

const ambient = new THREE.AmbientLight(0xffffff, 10); scene.add(ambient);
const key  = new THREE.DirectionalLight(0xffffff, 0); key.position.set(8, 20, 8); scene.add(key);
const fill = new THREE.DirectionalLight(0xaaccff, 0); fill.position.set(-10, 4, -8); scene.add(fill);
const rim  = new THREE.DirectionalLight(0xffeedd, 0); rim.position.set(0, -8, -10); scene.add(rim);

let lightBlend = 0;
function applyLight(b) {
  ambient.intensity = THREE.MathUtils.lerp(10, 0.3, b);
  key.intensity     = THREE.MathUtils.lerp(0, 1.8, b);
  fill.intensity    = THREE.MathUtils.lerp(0, 0.5, b);
  rim.intensity     = THREE.MathUtils.lerp(0, 0.3, b);
}

const FONT = {
  'A':['01110','10001','11111','10001','10001'],
  'B':['11110','10001','11110','10001','11110'],
  'C':['01110','10000','10000','10000','01110'],
  'D':['11100','10010','10001','10010','11100'],
  'E':['11111','10000','11110','10000','11111'],
  'F':['11111','10000','11100','10000','10000'],
  'G':['01110','10000','10011','10001','01110'],
  'H':['10001','10001','11111','10001','10001'],
  'I':['11111','00100','00100','00100','11111'],
  'J':['00111','00001','00001','10001','01110'],
  'K':['10001','10010','11100','10010','10001'],
  'L':['10000','10000','10000','10000','11111'],
  'M':['10001','11011','10101','10001','10001'],
  'N':['10001','11001','10101','10011','10001'],
  'O':['01110','10001','10001','10001','01110'],
  'P':['11110','10001','11110','10000','10000'],
  'Q':['01110','10001','10101','10010','01101'],
  'R':['11110','10001','11110','10010','10001'],
  'S':['01111','10000','01110','00001','11110'],
  'T':['11111','00100','00100','00100','00100'],
  'U':['10001','10001','10001','10001','01110'],
  'V':['10001','10001','10001','01010','00100'],
  'W':['10001','10001','10101','11011','10001'],
  'X':['10001','01010','00100','01010','10001'],
  'Y':['10001','01010','00100','00100','00100'],
  'Z':['11111','00010','00100','01000','11111'],
  '0':['01110','10011','10101','11001','01110'],
  '1':['00100','01100','00100','00100','01110'],
  '2':['01110','10001','00110','01000','11111'],
  '3':['11110','00001','00110','00001','11110'],
  '4':['10001','10001','11111','00001','00001'],
  '5':['11111','10000','11110','00001','11110'],
  '6':['01110','10000','11110','10001','01110'],
  '7':['11111','00001','00010','00100','00100'],
  '8':['01110','10001','01110','10001','01110'],
  '9':['01110','10001','01111','00001','01110'],
  '!':['00100','00100','00100','00000','00100'],
  '?':['01110','10001','00110','00000','00100'],
  ' ':['00000','00000','00000','00000','00000'],
};

const geo = new THREE.BoxGeometry(0.88, 0.88, 0.88);
const mat = new THREE.MeshLambertMaterial({ color: 0xffffff });
const POOL = new THREE.Vector3(0, -60, 0);
const voxels = [];

function getVoxel(i) {
  if (i < voxels.length) return voxels[i];
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(POOL);
  scene.add(mesh);
  const v = { mesh, from: POOL.clone(), to: POOL.clone() };
  voxels.push(v);
  return v;
}

function buildCityPositions() {
  const H = [
    [0,0,1,2,2,1,0,0],
    [0,1,2,4,4,2,1,0],
    [1,2,4,6,5,3,2,0],
    [0,1,3,5,6,4,2,1],
    [0,1,2,4,4,3,1,0],
    [0,0,1,2,3,2,0,0],
  ];
  const s = 1.4, rows = H.length, cols = H[0].length;
  const out = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      for (let y = 0; y < H[r][c]; y++)
        out.push(new THREE.Vector3((c-(cols-1)/2)*s, y, (r-(rows-1)/2)*s));
  return out;
}

function buildVoxlPositions() {
  const glyphs = {
    V:['110011','110011','110011','011110','001100','001100'],
    O:['011110','110011','110011','110011','110011','011110'],
    X:['110011','110011','011110','011110','110011','110011'],
    L:['110000','110000','110000','110000','111111','111111'],
  };
  const word = ['V','O','X','L'];
  const lw=6, gap=2, lh=6;
  const totalW = word.length*lw + (word.length-1)*gap;
  const s = 0.88;
  const out = [];
  word.forEach((ch, li) => {
    glyphs[ch].forEach((row, ri) => {
      [...row].forEach((bit, ci) => {
        if (bit==='1') out.push(new THREE.Vector3(
          (li*(lw+gap)+ci-(totalW-1)/2)*s, 0, (ri-(lh-1)/2)*s
        ));
      });
    });
  });
  return out;
}

function buildWordPositions(word) {
  const chars = [...word.toUpperCase()].filter(c => FONT[c]);
  if (chars.length === 0) return [];
  const lw=5, gap=1, lh=5;
  const totalW = chars.length*(lw+gap) - gap;
  const s = Math.min(1.3, 24 / Math.max(totalW, 1));
  const out = [];
  chars.forEach((ch, li) => {
    FONT[ch].forEach((row, ri) => {
      [...row].forEach((bit, ci) => {
        if (bit==='1') out.push(new THREE.Vector3(
          (li*(lw+gap)+ci-(totalW-1)/2)*s, 0, (ri-(lh-1)/2)*s
        ));
      });
    });
  });
  return out;
}

const CITY_POS = buildCityPositions();
const VOXL_POS = buildVoxlPositions();
CITY_POS.forEach((p, i) => { getVoxel(i).mesh.position.copy(p); });

let phase = 'idle', progress = 0, animDuration = 1.4, animEase;
let currentArr = 'city', isAssembled = true;
let currentTargets = CITY_POS.map(p => p.clone());

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut(t)   { return 1-(1-t)*(1-t); }

function startAnim(positions, dur, easeFn) {
  for (let i = voxels.length; i < positions.length; i++) getVoxel(i);
  voxels.forEach((v, i) => {
    v.from.copy(v.mesh.position);
    v.to.copy(i < positions.length ? positions[i] : POOL);
  });
  animEase = easeFn || easeInOut;
  animDuration = dur;
  phase = 'animating';
  progress = 0;
}

const hintEl = document.getElementById('hint');
const modeEl = document.getElementById('mode');
const btnCity = document.getElementById('btnCity');
const btnLetters = document.getElementById('btnLetters');
const btnBuild = document.getElementById('btnBuild');
const wordInput = document.getElementById('wordInput');

function setActiveBtn(id) {
  [btnCity, btnLetters, btnBuild].forEach(b => b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

function goToArrangement(positions, label, arrName, btnId) {
  if (phase !== 'idle' || !isAssembled) return;
  currentArr = arrName;
  currentTargets = positions.map(p => p.clone());
  startAnim(positions, 1.8);
  modeEl.textContent = label;
  setActiveBtn(btnId);
}

btnCity.onclick    = () => goToArrangement(CITY_POS, 'CITY', 'city', 'btnCity');
btnLetters.onclick = () => goToArrangement(VOXL_POS, 'VOXL', 'letters', 'btnLetters');

btnBuild.onclick = () => {
  const word = wordInput.value.trim();
  if (!word || phase !== 'idle' || !isAssembled) return;
  const positions = buildWordPositions(word);
  if (positions.length === 0) return;
  currentArr = 'word';
  currentTargets = positions.map(p => p.clone());
  startAnim(positions, 1.8);
  modeEl.textContent = word.toUpperCase();
  setActiveBtn('btnBuild');
};

wordInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') btnBuild.click();
  e.stopPropagation();
});

let pDown = { x: 0, y: 0 };
renderer.domElement.addEventListener('pointerdown', e => { pDown = { x: e.clientX, y: e.clientY }; });
renderer.domElement.addEventListener('pointerup', e => {
  if (Math.hypot(e.clientX-pDown.x, e.clientY-pDown.y) > 5) return;
  if (phase !== 'idle') return;
  if (isAssembled) {
    const targets = voxels.map(v => {
      if (v.mesh.position.y < -10) return POOL.clone();
      const ang = Math.random() * Math.PI * 2;
      const r = 18 + Math.random() * 14;
      return new THREE.Vector3(Math.cos(ang)*r, v.mesh.position.y, Math.sin(ang)*r);
    });
    startAnim(targets, 0.9, easeOut);
    isAssembled = false;
    hintEl.textContent = 'CLICK TO REASSEMBLE · DRAG TO ORBIT';
    [btnCity, btnLetters, btnBuild].forEach(b => b.disabled = true);
  } else {
    startAnim(currentTargets, 1.4);
    isAssembled = true;
    hintEl.textContent = 'CLICK TO SCATTER · DRAG TO ORBIT';
    [btnCity, btnLetters, btnBuild].forEach(b => b.disabled = false);
  }
});

const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05);
  if (phase === 'animating') {
    progress = Math.min(1, progress + dt / animDuration);
    const t = animEase(progress);
    voxels.forEach(v => v.mesh.position.lerpVectors(v.from, v.to, t));
    if (progress >= 1) {
      voxels.forEach(v => { v.mesh.position.copy(v.to); v.mesh.rotation.set(0,0,0); });
      phase = 'idle';
    }
  }
  applyLight(lightBlend);
  controls.update();
  renderer.render(scene, camera);
});

document.getElementById('lightBlend').oninput = e => { lightBlend = e.target.value / 100; };

window.addEventListener('resize', () => {
  aspect = innerWidth / innerHeight;
  camera.left = -frustum*aspect; camera.right = frustum*aspect;
  camera.top = frustum; camera.bottom = -frustum;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
